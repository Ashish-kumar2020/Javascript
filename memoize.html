    // Once Function -> which is executed only once rest calls are ignored
    function greetOnce(fn){
        let isExecuted = false;
        return function (){
            if(isExecuted){
                return;
            }
            isExecuted = true;
            return fn();
        }
    }

        console.log("Heeeloooo")
